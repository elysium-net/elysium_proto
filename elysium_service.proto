syntax = "proto3";

package elysium_api;

import "elysium.proto";

// Elysium Service
service Elysium {
  // Login the User
  rpc LoginUser(LoginUserRequest) returns (LoginUserResponse);
  // Authenticate User
  rpc AuthUser(AuthUserRequest) returns (AuthUserResponse);
}

// Login User Request
message LoginUserRequest {
  // Unique User Identifier
  string userid = 1;
  // User Password Hash
  string password = 2;
}

// Login User Response
message LoginUserResponse {
  oneof result {
    // User Session Token
    string token = 1;
    // Error
    Error error = 2;
  }
}

// Authentication User Request
message AuthUserRequest {
  // User Session Token
  optional string token = 1;
}

// Authentication User Response
message AuthUserResponse {
  oneof result {
    // User Profile
    elysium.UserProfile profile = 1;
    // Error
    Error error = 2;
  }
}

// Error Type
message Error {
  // Error Kind
  ErrorCode kind = 1;
  // Error Message
  string message = 2;
}

// Error Code
enum ErrorCode {
  // Unknown Error Code
  ERROR_CODE_UNSPECIFIED = 0;
  // Authentication Error
  ERROR_CODE_AUTHENTICATION = 1;
  // Not Found Error
  ERROR_CODE_NOT_FOUND = 3;
}
