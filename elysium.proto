syntax = "proto3";

package elysium;

// Application User
message User {
  // Visible Username
  string username = 1;
  // Unique User Identifier
  string userid = 2;
  // User Password Hash
  string password = 3;
  // User E-Mail
  string email = 4;
  // User Role
  Role role = 5;
}

message UserProfile {
  // Visible Username
  string username = 1;
  // User Role
  Role role = 2;
}

// User Role
enum Role {
  // Default Role (User)
  ROLE_USER_UNSPECIFIED = 0;
  // Supervisor Role
  ROLE_SUPERVISOR = 1;
  // Administrator Role
  ROLE_ADMIN = 2;
}
